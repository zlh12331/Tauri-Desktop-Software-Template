# cargo-deny configuration
#
# Run `cargo deny check` to validate all four domains below.
# Based on codex-main's deny.toml, adapted for this project.

[advisories]
# Vulnerability database: https://rustsec.org/advisories/
# Ignored advisories should include a `reason` field explaining why and
# when the ignore can be removed.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
# Skip unmaintained/unsound checks: many are transitive deps of
# Tauri/GTK with no safe upgrade available (e.g. unic-*, glib 0.18).
unmaintained = "none"
unsound = "none"
ignore = [
    # quick-xml 0.39.4 is pulled in by wayland-scanner (Linux-only build-time dep).
    # It parses Wayland protocol XML (trusted, hardcoded input — not user-supplied).
    # The runtime quick-xml (via plist) has been updated to 0.41.0 (plist 1.10.0).
    { id = "RUSTSEC-2026-0194", reason = "wayland-scanner build-time only; trusted XML input" },
    { id = "RUSTSEC-2026-0195", reason = "wayland-scanner build-time only; trusted XML input" },
]

[licenses]
# Allow only permissive and weak copyleft licenses.
# Strong copyleft (GPL, AGPL) and non-commercial licenses are denied.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "Unlicense",
    # Permissive data license used by webpki-root-certs / webpki-roots
    # for bundled root CA certificate data.
    "CDLA-Permissive-2.0",
]
# Confidence threshold for license detection
confidence-threshold = 0.8

# tauri-nspanel ships MIT/Apache-2.0 license files but does not declare
# a license expression in its Cargo.toml manifest.
[[licenses.exceptions]]
allow = ["MIT", "Apache-2.0"]
name = "tauri-nspanel"
version = "2.1.0"

[bans]
# Warn on multiple versions of the same crate in the dependency tree.
multiple-versions = "warn"
# Allow wildcard dependencies (e.g. `*`).
wildcards = "allow"
# Highlight all duplicate versions in output.
highlight = "all"
# Allow specific crates that are known to have duplicate versions.
# Each entry should include a `reason` field.
allow = []
deny = []
skip = []
skip-tree = []

[sources]
# Deny crates from unknown registries or git sources.
unknown-registry = "deny"
unknown-git = "deny"
# Require git sources to be pinned to a specific revision.
required-git-spec = "rev"
# Only allow crates from crates.io.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/ahkohd/tauri-nspanel"]
