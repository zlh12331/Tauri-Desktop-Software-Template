name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=moderate

      - name: npm audit (devDependencies)
        run: npm audit --audit-level=high

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust security audit
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Rust dependency audit (cargo-deny)
        working-directory: src-tauri
        run: cargo deny check

  quality:
    name: Code Quality
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Frontend unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Dead code detection (knip)
        run: npm run knip

      - name: Duplicate code detection (jscpd)
        run: npm run jscpd

      - name: Architecture rules (ast-grep)
        run: npm run ast:lint

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Rust nightly (for branch coverage)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust coverage report
        working-directory: src-tauri
        run: |
          mkdir -p ../coverage
          cargo +nightly llvm-cov --branch --text --output-path ../coverage/rust-coverage.txt --fail-under-lines 60

      - name: Upload Rust coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage-report
          path: coverage/rust-coverage.txt
          retention-days: 30

      - name: Verify clean worktree
        if: always()
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is not clean after CI steps. Run formatting/lint fixes or regenerate bindings locally."
            git status --porcelain
            git diff
            exit 1
          fi

  e2e:
    name: E2E Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  build:
    name: Build (${{ matrix.platform }})
    needs: [quality, e2e]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      # CI 验证只编译 Rust + 前端，不生成安装包。
      # 完整 bundle 需要 TAURI_SIGNING_PRIVATE_KEY（updater.pubkey 已配置），
      # 该密钥仅在 release 流水线中提供。使用 --no-bundle 跳过签名步骤，
      # 同时仍能验证跨平台编译是否通过。
      - name: Build Tauri app (compile check)
        run: npx tauri build --no-bundle
